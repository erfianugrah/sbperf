name: Live smoke

# Manual only - hits a real Supabase project. Requires repo secrets:
#   SUPABASE_ACCESS_TOKEN
#   SBPERF_SMOKE_REF       (the project ref to probe)
on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: live smoke
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SBPERF_SMOKE_REF: ${{ secrets.SBPERF_SMOKE_REF }}
        run: bun run smoke
