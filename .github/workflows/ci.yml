name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC - catch upstream API drift proactively

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx biome check .
      - run: bun run typecheck
      - run: bun test

  api-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Check endpoints against upstream Management API spec
        run: bun run scripts/check-api-drift.ts
      - name: Check derived inspect SQL against upstream CLI (advisory)
        run: bun run scripts/check-inspect-drift.ts
